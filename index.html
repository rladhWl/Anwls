<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원소 이름 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #7cffd4;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 16px 20px 24px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(124,255,212,0.04) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(255,107,107,0.04) 0%, transparent 60%);
  }

  .quiz-container {
    width: 100%;
    max-width: 500px;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.4s ease;
  }

  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .group-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .symbol-display {
    font-family: 'Space Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(124,255,212,0.3);
  }

  .atomic-number {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .answer-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
    letter-spacing: 1px;
  }

  .answer-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,255,212,0.08);
  }

  .answer-input.correct {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,255,212,0.1);
  }

  .answer-input.wrong {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .feedback {
    min-height: 24px;
    font-size: 13px;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
    transition: opacity 0.2s;
  }

  .feedback.correct { color: var(--accent); }
  .feedback.wrong { color: var(--accent2); }
  .feedback.hint { color: var(--accent3); }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .btn-primary:hover {
    background: #a0ffe0;
    transform: translateY(-1px);
  }

  .btn-skip {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    margin-top: 8px;
    font-size: 11px;
  }

  .btn-skip:hover { color: var(--text); border-color: var(--muted); }

  .score-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 14px;
  }

  .score-item {
    text-align: center;
  }

  .score-item .val {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
  }

  .score-item .lbl {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .correct-val { color: var(--accent); }
  .wrong-val { color: var(--accent2); }

  /* Result screen */
  .result-screen {
    text-align: center;
  }

  .result-emoji {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .result-title {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .result-score {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .wrong-list {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
    text-align: left;
    max-height: 220px;
    overflow-y: auto;
  }

  .wrong-list h3 {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent2);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .wrong-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .wrong-item:last-child { border-bottom: none; }

  .wrong-sym {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--accent2);
    width: 40px;
  }

  .wrong-ans {
    color: var(--muted);
    font-size: 12px;
    flex: 1;
    text-align: center;
  }

  .wrong-correct {
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .hidden { display: none; }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 12px;
    margin-bottom: 4px;
  }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .filter-btn:hover:not(.active) {
    border-color: var(--muted);
    color: var(--text);
  }

  .charge-badge {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent3);
    margin-bottom: 4px;
  }

  /* ── 모드 탭 ── */
  .mode-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 14px;
  }
  .mode-tab {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

  /* ── 플래시카드 ── */
  .flashcard-wrap { perspective: 1000px; margin-bottom: 16px; cursor: pointer; }
  .flashcard {
    width: 100%; height: 220px; position: relative;
    transform-style: preserve-3d; transition: transform 0.5s ease; border-radius: 16px;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-front, .fc-back {
    position: absolute; width: 100%; height: 220px; border-radius: 16px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px; text-align: center;
  }
  .fc-front { background: var(--surface); border: 1px solid var(--border); transform: rotateY(0deg); }
  .fc-front::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg,transparent,var(--accent),transparent);
    opacity:.5; border-radius: 16px 16px 0 0;
  }
  .fc-back { background: var(--surface); border: 1px solid var(--accent); transform: rotateY(180deg); }
  .fc-symbol { font-family:'Space Mono',monospace; font-size:52px; font-weight:700; color:var(--accent); text-shadow:0 0 30px rgba(124,255,212,0.3); line-height:1; margin-bottom:8px; }
  .fc-group { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); border:1px solid var(--border); border-radius:20px; padding:2px 10px; margin-bottom:10px; }
  .fc-tap { font-size:10px; color:var(--muted); margin-top:10px; letter-spacing:1px; }
  .fc-hint { font-size:11px; color:var(--muted); margin-top:6px; }
  .fc-en { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; color:var(--accent); margin-bottom:6px; }
  .fc-ko { font-size:18px; color:var(--accent3); font-weight:700; margin-bottom:4px; }
  .fc-extra { font-size:12px; color:var(--muted); margin-top:4px; }
  .fc-nav { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
  .fc-nav-btn {
    font-family:'Space Mono',monospace; font-size:18px; background:var(--surface);
    border:1px solid var(--border); color:var(--text); border-radius:10px;
    padding:10px 18px; cursor:pointer; transition:all 0.15s; flex:1;
  }
  .fc-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
  .fc-progress { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); text-align:center; flex:1; }
  .fc-shuffle {
    width:100%; padding:10px; background:transparent; border:1px solid var(--border);
    border-radius:10px; color:var(--muted); font-family:'Space Mono',monospace;
    font-size:11px; letter-spacing:1px; cursor:pointer; transition:all 0.15s; margin-bottom:10px;
  }
  .fc-shuffle:hover { border-color:var(--accent3); color:var(--accent3); }

  /* ── 목록 보기 ── */
  .list-search {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; font-family:'Noto Sans KR',sans-serif; font-size:14px;
    color:var(--text); outline:none; margin-bottom:12px; transition:border-color 0.2s;
  }
  .list-search:focus { border-color:var(--accent); }
  .list-scroll { max-height:400px; overflow-y:auto; border:1px solid var(--border); border-radius:10px; }
  .list-scroll::-webkit-scrollbar { width:4px; }
  .list-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .list-table { width:100%; border-collapse:collapse; font-size:12px; }
  .list-table th { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--muted); text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); }
  .list-table td { padding:7px 8px; border-bottom:1px solid rgba(42,42,58,0.5); vertical-align:middle; }
  .list-table tr:hover td { background:rgba(124,255,212,0.03); }
  .td-sym { font-family:'Space Mono',monospace; font-weight:700; color:var(--accent); font-size:14px; width:90px; }
  .td-en { color:var(--text); }
  .td-ko { color:var(--accent3); font-size:11px; }
  .td-group { color:var(--muted); font-size:10px; }
  .list-filter-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
</style>
</head>
<body>
<div class="quiz-container">

  <!-- 모드 탭 -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-quiz" onclick="switchMode('quiz')">📝 퀴즈</button>
    <button class="mode-tab" id="tab-flash" onclick="switchMode('flash')">🃏 플래시카드</button>
    <button class="mode-tab" id="tab-list" onclick="switchMode('list')">📋 목록 보기</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen">
    <div class="header">
      <h1>⚗ Element Quiz</h1>
      <!-- 문제 방향 선택 -->
      <div class="filter-row" style="margin-bottom:6px;">
        <button class="filter-btn active" id="d-sym2en"  onclick="setDirection('sym2en')">기호→영어</button>
        <button class="filter-btn"        id="d-sym2ko"  onclick="setDirection('sym2ko')">기호→한국어</button>
        <button class="filter-btn"        id="d-en2sym"  onclick="setDirection('en2sym')">영어→기호</button>
        <button class="filter-btn"        id="d-en2ko"   onclick="setDirection('en2ko')">영어→한국어</button>
        <button class="filter-btn"        id="d-ko2en"   onclick="setDirection('ko2en')">한국어→영어</button>
        <button class="filter-btn"        id="d-ko2sym"  onclick="setDirection('ko2sym')">한국어→기호</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" id="f-all"      onclick="setFilter('all')">전체</button>
        <button class="filter-btn"        id="f-element"  onclick="setFilter('element')">원소</button>
        <button class="filter-btn"        id="f-ion1"     onclick="setFilter('ion1')">유형1 이온</button>
        <button class="filter-btn"        id="f-ion2"     onclick="setFilter('ion2')">유형2 이온</button>
        <button class="filter-btn"        id="f-poly"     onclick="setFilter('poly')">다원자 이온</button>
        <button class="filter-btn"        id="f-comp1"    onclick="setFilter('comp1')">유형I 화합물</button>
        <button class="filter-btn"        id="f-comp2"    onclick="setFilter('comp2')">유형II 화합물</button>
        <button class="filter-btn"        id="f-comp3"    onclick="setFilter('comp3')">유형III 화합물</button>
        <button class="filter-btn"        id="f-comppoly" onclick="setFilter('comppoly')">다원자이온 화합물</button>
        <button class="filter-btn"        id="f-acid"     onclick="setFilter('acid')">산(acid)</button>
        <button class="filter-btn"        id="f-valence"  onclick="setFilter('valence')">전하구분 퀴즈</button>
        <button class="filter-btn"        id="f-solubility" onclick="setFilter('solubility')">용해도 규칙</button>
        <button class="filter-btn"        id="f-oldname"  onclick="setFilter('oldname')">관용명(ferric 등)</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">1 / 30</div>
    </div>

    <div class="card">
      <div class="group-tag" id="group-tag">Group 1</div>
      <div class="symbol-display" id="symbol">H</div>
      <div class="charge-badge" id="charge-badge"></div>
      <div class="atomic-number" id="atomic-num">원자번호 1</div>

      <div class="input-group">
        <input type="text" class="answer-input" id="answer-input"
               placeholder="영어 이름 입력..." autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>

      <div class="feedback" id="feedback"></div>

      <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">확인</button>
      <button class="btn btn-skip" onclick="skipQuestion()">모르겠어 → 다음</button>
    </div>

    <div class="score-row">
      <div class="score-item">
        <div class="val correct-val" id="correct-count">0</div>
        <div class="lbl">맞음</div>
      </div>
      <div class="score-item">
        <div class="val wrong-val" id="wrong-count">0</div>
        <div class="lbl">틀림</div>
      </div>
      <div class="score-item">
        <div class="val" id="remain-count">30</div>
        <div class="lbl">남음</div>
      </div>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="hidden">
    <div class="card result-screen">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">퀴즈 완료!</div>
      <div class="result-score" id="result-score"></div>

      <div class="wrong-list" id="wrong-list-container">
        <h3>❌ 틀린 문제</h3>
        <div id="wrong-items"></div>
      </div>

      <button class="btn btn-primary" onclick="restartQuiz()">다시 풀기</button>
    </div>
  </div>

  <!-- 플래시카드 화면 -->
  <div id="flash-screen" class="hidden">
    <div class="header">
      <h1>🃏 플래시카드</h1>
      <!-- 방향 선택 -->
      <div class="filter-row" style="margin-bottom:6px;">
        <button class="filter-btn active" id="fd-sym2en"  onclick="setFlashDir('sym2en')">기호→영어</button>
        <button class="filter-btn"        id="fd-sym2ko"  onclick="setFlashDir('sym2ko')">기호→한국어</button>
        <button class="filter-btn"        id="fd-en2sym"  onclick="setFlashDir('en2sym')">영어→기호</button>
        <button class="filter-btn"        id="fd-en2ko"   onclick="setFlashDir('en2ko')">영어→한국어</button>
        <button class="filter-btn"        id="fd-ko2en"   onclick="setFlashDir('ko2en')">한국어→영어</button>
        <button class="filter-btn"        id="fd-ko2sym"  onclick="setFlashDir('ko2sym')">한국어→기호</button>
      </div>
      <!-- 범위 필터 -->
      <div class="filter-row" id="flash-filter-row">
        <button class="filter-btn active" id="ff-all" onclick="setStudyFilter('all')">전체</button>
        <button class="filter-btn" id="ff-element" onclick="setStudyFilter('element')">원소</button>
        <button class="filter-btn" id="ff-ion1" onclick="setStudyFilter('ion1')">유형1 이온</button>
        <button class="filter-btn" id="ff-ion2" onclick="setStudyFilter('ion2')">유형2 이온</button>
        <button class="filter-btn" id="ff-oldname" onclick="setStudyFilter('oldname')">관용명</button>
        <button class="filter-btn" id="ff-poly" onclick="setStudyFilter('poly')">다원자 이온</button>
        <button class="filter-btn" id="ff-comp1" onclick="setStudyFilter('comp1')">유형I 화합물</button>
        <button class="filter-btn" id="ff-comp2" onclick="setStudyFilter('comp2')">유형II 화합물</button>
        <button class="filter-btn" id="ff-comp3" onclick="setStudyFilter('comp3')">유형III 화합물</button>
        <button class="filter-btn" id="ff-comppoly" onclick="setStudyFilter('comppoly')">다원자이온 화합물</button>
        <button class="filter-btn" id="ff-acid" onclick="setStudyFilter('acid')">산(acid)</button>
        <button class="filter-btn" id="ff-valence" onclick="setStudyFilter('valence')">전하구분</button>
        <button class="filter-btn" id="ff-solubility" onclick="setStudyFilter('solubility')">용해도</button>
      </div>
    </div>

    <button class="fc-shuffle" onclick="shuffleFlash()">🔀 섞기</button>

    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="fc-front">
          <div class="fc-group" id="fc-group">원소</div>
          <div class="fc-symbol" id="fc-symbol">H</div>
          <div class="fc-hint" id="fc-front-hint"></div>
          <div class="fc-tap">탭해서 정답 보기 ▼</div>
        </div>
        <div class="fc-back">
          <div class="fc-group" id="fc-back-group" style="margin-bottom:8px"></div>
          <div class="fc-en" id="fc-en">hydrogen</div>
          <div class="fc-ko" id="fc-ko">수소</div>
          <div class="fc-extra" id="fc-extra"></div>
          <div class="fc-tap" style="margin-top:12px">탭해서 앞으로 ▲</div>
        </div>
      </div>
    </div>

    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="fcPrev()">←</button>
      <div class="fc-progress" id="fc-progress">1 / 1</div>

function getKor(name) {
  const key = name.toLowerCase().replace(/\s*\(\s*([ivx]+)\s*\)/g, (_, r) => `(${r})`);
  return korNames[key] || '';
}
let queue = [];
let currentIdx = 0;
let correctCount = 0;
let wrongCount = 0;
let wrongItems = [];
let answered = false;
let currentDirection = 'sym2en'; // 기본: 기호→영어

const ALL_DIRECTIONS = ['sym2en','sym2ko','en2sym','en2ko','ko2en','ko2sym'];

function setDirection(d) {
  currentDirection = d;
  ALL_DIRECTIONS.forEach(k => {
    const el = document.getElementById('d-'+k);
    if (el) el.classList.toggle('active', k === d);
  });
  startQuiz();
}

function getFiltered() {
  if (currentFilters.has('all')) return allItems;
  return allItems.filter(i => currentFilters.has(i.type));
}

const ALL_FILTERS = ['all','element','ion1','ion2','poly','comp1','comp2','comp3','comppoly','acid','valence','solubility','oldname'];

function setFilter(f) {
  if (f === 'all') {
    // 전체 선택하면 나머지 해제
    currentFilters = new Set(['all']);
  } else {
    // 전체 해제
    currentFilters.delete('all');
    // 토글
    if (currentFilters.has(f)) {
      currentFilters.delete(f);
      // 아무것도 없으면 전체로 돌아감
      if (currentFilters.size === 0) currentFilters.add('all');
    } else {
      currentFilters.add(f);
    }
  }
  // 버튼 활성화 업데이트
  ALL_FILTERS.forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) el.classList.toggle('active', currentFilters.has(k));
  });
  startQuiz();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  // 방향에 따라 한국어 없는 항목 필터링
  let filtered = getFiltered();
  if (currentDirection === 'sym2ko' || currentDirection === 'en2ko' || currentDirection === 'ko2en' || currentDirection === 'ko2sym') {
    filtered = filtered.filter(i => getKor(i.name));
  }
  queue = shuffle(filtered);
  currentIdx = 0;
  correctCount = 0;
  wrongCount = 0;
  wrongItems = [];
  answered = false;
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  renderQuestion();
  updateScore();
}

// 문제 방향별 question/answer 추출
function getQA(el) {
  const kor = getKor(el.name);
  switch (currentDirection) {
    case 'sym2en':  return { q: el.symbol,  a: el.name,   qLabel: '영어 이름 입력',   aLabel: el.name };
    case 'sym2ko':  return { q: el.symbol,  a: kor,        qLabel: '한국어 이름 입력', aLabel: kor };
    case 'en2sym':  return { q: el.name,    a: el.symbol,  qLabel: '기호(화학식) 입력', aLabel: el.symbol };
    case 'en2ko':   return { q: el.name,    a: kor,        qLabel: '한국어 이름 입력', aLabel: kor };
    case 'ko2en':   return { q: kor,        a: el.name,   qLabel: '영어 이름 입력',   aLabel: el.name };
    case 'ko2sym':  return { q: kor,        a: el.symbol,  qLabel: '기호(화학식) 입력', aLabel: el.symbol };
    default:        return { q: el.symbol,  a: el.name,   qLabel: '영어 이름 입력',   aLabel: el.name };
  }
}

function renderQuestion() {
  const el = queue[currentIdx];
  const { q, a, qLabel } = getQA(el);
  const kor = getKor(el.name);

  // 문제 표시: 기호/화학식 크기로 표시
  document.getElementById('symbol').textContent = q;
  document.getElementById('group-tag').textContent = el.group;

  // 부가 정보
  const chargeBadge = document.getElementById('charge-badge');
  const atomicNum = document.getElementById('atomic-num');

  // sym2en / sym2ko 일 때만 기존 힌트 표시
  if (currentDirection === 'sym2en' || currentDirection === 'sym2ko') {
    if (el.type === 'element') {
      chargeBadge.textContent = '';
      atomicNum.textContent = `원자번호 ${el.num || ''}`;
    } else if (el.charge) {
      chargeBadge.textContent = `전하: ${el.charge}`;
      atomicNum.textContent = qLabel;
    } else if (el.hint) {
      chargeBadge.textContent = `💡 ${el.hint}`;
      atomicNum.textContent = qLabel;
    } else {
      chargeBadge.textContent = '';
      atomicNum.textContent = qLabel;
    }
  } else if (currentDirection === 'en2sym' || currentDirection === 'en2ko') {
    // 영어 이름이 문제 → 분류 힌트
    chargeBadge.textContent = el.hint ? `💡 ${el.hint}` : (el.charge ? `전하: ${el.charge}` : '');
    atomicNum.textContent = qLabel;
  } else {
    // 한국어가 문제
    chargeBadge.textContent = el.hint ? `💡 ${el.hint}` : (el.charge ? `전하: ${el.charge}` : '');
    atomicNum.textContent = qLabel;
  }

  document.getElementById('answer-input').placeholder = qLabel + '...';
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').className = 'answer-input';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('submit-btn').textContent = '확인';
  document.getElementById('progress-fill').style.width = `${(currentIdx / queue.length) * 100}%`;
  document.getElementById('progress-text').textContent = `${currentIdx + 1} / ${queue.length}`;
  document.getElementById('remain-count').textContent = queue.length - currentIdx;
  answered = false;
  document.getElementById('answer-input').focus();
}

function submitAnswer() {
  if (answered) { nextQuestion(); return; }
  const input = document.getElementById('answer-input');
  const raw = input.value.trim();
  if (!raw) return;
  answered = true;

  const el = queue[currentIdx];
  const { a, aLabel } = getQA(el);
  const kor = getKor(el.name);

  const normalize = s => s
    .toLowerCase()
    .replace(/\s*\(\s*([ivx]+)\s*\)/g, (_, r) => `(${r})`)
    .replace(/\s+/g, ' ')
    .trim();

  // 첨자/윗첨자/특수기호 → 일반 문자 변환
  const stripSup = s => s
    .replace(/⁰/g,'0').replace(/¹/g,'1').replace(/²/g,'2').replace(/³/g,'3')
    .replace(/⁴/g,'4').replace(/⁵/g,'5').replace(/⁶/g,'6').replace(/⁷/g,'7')
    .replace(/⁸/g,'8').replace(/⁹/g,'9')
    .replace(/⁺/g,'+')
    .replace(/⁻/g,'-')   // 윗첨자 마이너스 U+207B
    .replace(/−/g,'-')   // 수학 마이너스 U+2212
    .replace(/₀/g,'0').replace(/₁/g,'1').replace(/₂/g,'2').replace(/₃/g,'3')
    .replace(/₄/g,'4').replace(/₅/g,'5').replace(/₆/g,'6').replace(/₇/g,'7')
    .replace(/₈/g,'8').replace(/₉/g,'9');

  const isSymDir = currentDirection === 'en2sym' || currentDirection === 'ko2sym';
  // 기호 방향: 첨자변환 + 공백제거 + 대소문자무시
  // 이름 방향: normalize(소문자+로마자정리) + 첨자변환
  const userNorm    = isSymDir
    ? stripSup(raw.trim()).replace(/\s+/g,'').toUpperCase()
    : stripSup(normalize(raw));
  const correctNorm = isSymDir
    ? stripSup(a.trim()).replace(/\s+/g,'').toUpperCase()
    : stripSup(normalize(a));
  const isCorrect = userNorm === correctNorm;

  // 피드백: 정답 + 나머지 정보 보여주기
  const fb = document.getElementById('feedback');
  const fullInfo = buildFullInfo(el);

  if (isCorrect) {
    input.classList.add('correct');
    fb.innerHTML = `✓ 정답! ${fullInfo}`;
    fb.className = 'feedback correct';
    correctCount++;
  } else {
    input.classList.add('wrong');
    fb.innerHTML = `✗ <b>${a}</b> ${fullInfo}`;
    fb.className = 'feedback wrong';
    wrongCount++;
    wrongItems.push({ symbol: el.symbol, correct: a, kor, userAnswer: raw, name: el.name });
  }

  updateScore();
  document.getElementById('submit-btn').textContent = '다음 →';
}

// 정답 후 부가 정보 — 문제에 쓰인 것 제외하고 나머지 다 보여줌
function buildFullInfo(el) {
  const kor = getKor(el.name);
  const dir = currentDirection;
  const parts = [];

  // 기호가 문제가 아니었으면 기호 보여주기
  if (dir !== 'sym2en' && dir !== 'sym2ko') {
    parts.push(`<span style="color:var(--accent);font-size:12px">[${el.symbol}]</span>`);
  }
  // 영어가 문제/정답이 아니었으면 영어 보여주기
  if (dir !== 'sym2en' && dir !== 'en2sym' && dir !== 'en2ko' && dir !== 'ko2en') {
    parts.push(`<span style="color:var(--text);font-size:12px">${el.name}</span>`);
  }
  // 한국어가 문제/정답이 아니었으면 한국어 보여주기
  if (kor && dir !== 'sym2ko' && dir !== 'en2ko' && dir !== 'ko2en' && dir !== 'ko2sym') {
    parts.push(`<span style="color:var(--accent3);font-size:12px">(${kor})</span>`);
  }
  return parts.length ? '<br><small>' + parts.join(' ') + '</small>' : '';
}

function skipQuestion() {
  const el = queue[currentIdx];
  const { a } = getQA(el);
  const kor = getKor(el.name);
  const fb = document.getElementById('feedback');
  document.getElementById('answer-input').className = 'answer-input wrong';
  fb.innerHTML = `정답: <b>${a}</b> ${buildFullInfo(el)}`;
  fb.className = 'feedback hint';
  wrongCount++;
  wrongItems.push({ symbol: el.symbol, correct: a, kor, userAnswer: '(패스)', name: el.name });
  answered = true;
  updateScore();
  document.getElementById('submit-btn').textContent = '다음 →';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= queue.length) showResult();
  else renderQuestion();
}

function updateScore() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  document.getElementById('remain-count').textContent = queue.length - currentIdx - (answered ? 1 : 0);
}

function showResult() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');
  const total = queue.length;
  const pct = Math.round((correctCount / total) * 100);
  let emoji = '😅', title = '더 연습해봐!';
  if (pct >= 90) { emoji = '🏆'; title = '완벽해!'; }
  else if (pct >= 70) { emoji = '🎉'; title = '잘했어!'; }
  else if (pct >= 50) { emoji = '💪'; title = '절반은 맞았어!'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `${correctCount} / ${total} 정답 (${pct}%)`;
  const container = document.getElementById('wrong-items');
  container.innerHTML = '';
  if (wrongItems.length === 0) {
    document.getElementById('wrong-list-container').style.display = 'none';
  } else {
    document.getElementById('wrong-list-container').style.display = '';
    wrongItems.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `
        <span class="wrong-sym">${w.symbol}</span>
        <span class="wrong-ans">${w.userAnswer}</span>
        <span class="wrong-correct">${w.correct}${w.kor ? `<br><span style="color:var(--accent3);font-size:10px">${w.kor}</span>` : ''}</span>
      `;
      container.appendChild(div);
    });
  }
}

function restartQuiz() {
  startQuiz();
}

// ── 모드 전환 ──────────────────────────────────────
let currentMode = 'quiz';
function switchMode(mode) {
  currentMode = mode;
  ['quiz','flash','list'].forEach(m => {
    document.getElementById(m+'-screen').classList.toggle('hidden', m !== mode);
    document.getElementById('tab-'+m).classList.toggle('active', m === mode);
  });
  if (mode === 'flash') initFlash();
  if (mode === 'list') { currentListFilter = 'all'; renderList(); }
}

// ── 플래시카드 ──────────────────────────────────────
let fcDeck = [];
let fcIdx = 0;
let fcFilters = new Set(['all']);
let fcDirection = 'sym2en';
const FC_FILTERS = ['all','element','ion1','ion2','oldname','poly','comp1','comp2','comp3','comppoly','acid','valence','solubility'];
const FC_DIRS    = ['sym2en','sym2ko','en2sym','en2ko','ko2en','ko2sym'];

function setFlashDir(d) {
  fcDirection = d;
  FC_DIRS.forEach(k => {
    const el = document.getElementById('fd-'+k);
    if (el) el.classList.toggle('active', k === d);
  });
  initFlash();
}

function setStudyFilter(f) {
  if (f === 'all') {
    fcFilters = new Set(['all']);
  } else {
    fcFilters.delete('all');
    if (fcFilters.has(f)) {
      fcFilters.delete(f);
      if (fcFilters.size === 0) fcFilters.add('all');
    } else {
      fcFilters.add(f);
    }
  }
  FC_FILTERS.forEach(k => {
    const el = document.getElementById('ff-'+k);
    if (el) el.classList.toggle('active', fcFilters.has(k));
  });
  initFlash();
}

function initFlash() {
  let deck = fcFilters.has('all') ? [...allItems] : allItems.filter(i => fcFilters.has(i.type));
  if (['sym2ko','en2ko','ko2en','ko2sym'].includes(fcDirection)) {
    deck = deck.filter(i => getKor(i.name));
  }
  fcDeck = deck;
  fcIdx = 0;
  renderFlashcard();
}

function shuffleFlash() {
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIdx = 0;
  document.getElementById('flashcard').classList.remove('flipped');
  renderFlashcard();
}

function renderFlashcard() {
  if (!fcDeck.length) return;
  const item = fcDeck[fcIdx];
  const kor = getKor(item.name);
  document.getElementById('flashcard').classList.remove('flipped');

  // 방향별 앞면/뒷면 결정
  let frontText, backMain, backSub, frontHint = '';
  switch (fcDirection) {
    case 'sym2en': frontText = item.symbol; backMain = item.name; backSub = kor;        break;
    case 'sym2ko': frontText = item.symbol; backMain = kor;       backSub = item.name;  break;
    case 'en2sym': frontText = item.name;   backMain = item.symbol; backSub = kor;      break;
    case 'en2ko':  frontText = item.name;   backMain = kor;       backSub = item.symbol; break;
    case 'ko2en':  frontText = kor;         backMain = item.name; backSub = item.symbol; break;
    case 'ko2sym': frontText = kor;         backMain = item.symbol; backSub = item.name; break;
    default:       frontText = item.symbol; backMain = item.name; backSub = kor;
  }

  // 앞면 힌트
  if (['sym2en','sym2ko'].includes(fcDirection)) {
    if (item.type === 'element') frontHint = `원자번호 ${item.num || ''}`;
    else if (item.charge) frontHint = `전하: ${item.charge}`;
    else if (item.hint) frontHint = item.hint;
  } else {
    frontHint = item.group;
  }

  // 관용명 체계명
  const sysMap = {ferric:'iron(III)',ferrous:'iron(II)',cupric:'copper(II)',cuprous:'copper(I)',cobaltic:'cobalt(III)',cobaltous:'cobalt(II)',stannic:'tin(IV)',stannous:'tin(II)',plumbic:'lead(IV)',plumbous:'lead(II)',mercuric:'mercury(II)',mercurous:'mercury(I)'};
  const extra = item.type === 'oldname' ? `체계명: ${sysMap[item.name] || ''}` : '';

  // 뒷면 메인 크기: 기호면 크게
  const enEl = document.getElementById('fc-en');
  enEl.style.fontSize = (fcDirection === 'en2sym' || fcDirection === 'ko2sym') ? '42px' : '20px';

  document.getElementById('fc-group').textContent = item.group;
  document.getElementById('fc-symbol').textContent = frontText;
  document.getElementById('fc-front-hint').textContent = frontHint;
  const backGroup = document.getElementById('fc-back-group');
  if (backGroup) backGroup.textContent = item.group;
  enEl.textContent = backMain;
  document.getElementById('fc-ko').textContent = backSub || '';
  document.getElementById('fc-extra').textContent = extra;
  document.getElementById('fc-progress').textContent = `${fcIdx + 1} / ${fcDeck.length}`;
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function fcNext() {
  fcIdx = (fcIdx + 1) % fcDeck.length;
  renderFlashcard();
}

function fcPrev() {
  fcIdx = (fcIdx - 1 + fcDeck.length) % fcDeck.length;
  renderFlashcard();
}

// ── 목록 보기 ──────────────────────────────────────
let listFilters = new Set(['all']);
const LIST_FILTERS = ['all','element','ion1','ion2','oldname','poly','comp1','comp2','comp3','comppoly','acid','valence','solubility'];

function setListFilter(f) {
  if (f === 'all') {
    listFilters = new Set(['all']);
  } else {
    listFilters.delete('all');
    if (listFilters.has(f)) {
      listFilters.delete(f);
      if (listFilters.size === 0) listFilters.add('all');
    } else {
      listFilters.add(f);
    }
  }
  LIST_FILTERS.forEach(k => {
    const el = document.getElementById('lf-'+k);
    if (el) el.classList.toggle('active', listFilters.has(k));
  });
  renderList();
}

function renderList() {
  const query = (document.getElementById('list-search').value || '').toLowerCase();
  let items = listFilters.has('all') ? allItems : allItems.filter(i => listFilters.has(i.type));
  if (query) {
    items = items.filter(i => {
      const kor = getKor(i.name).toLowerCase();
      return i.symbol.toLowerCase().includes(query) ||
             i.name.toLowerCase().includes(query) ||
             kor.includes(query) ||
             i.group.toLowerCase().includes(query);
    });
  }
  const tbody = document.getElementById('list-body');
  tbody.innerHTML = '';
  items.forEach(item => {
    const kor = getKor(item.name);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-sym">${item.symbol}</td>
      <td class="td-en">${item.name}</td>
      <td class="td-ko">${kor}</td>
      <td class="td-group">${item.group}</td>
    `;
    tbody.appendChild(tr);
  });
}

// 키보드 단축키: 플래시카드에서 ← → Space
document.addEventListener('keydown', e => {
  if (currentMode === 'quiz') {
    if (e.key === 'Enter') submitAnswer();
  } else if (currentMode === 'flash') {
    if (e.key === 'ArrowRight') fcNext();
    else if (e.key === 'ArrowLeft') fcPrev();
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  }
});

startQuiz();
</script>
